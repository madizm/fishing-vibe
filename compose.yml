services:
  postgis:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fishing_vibe}
      POSTGRES_USER: ${POSTGRES_USER:-fishing_vibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishing_vibe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  osm-import:
    image: iboates/osm2pgsql:2.2.0
    profiles: ["tools"]
    entrypoint: ["osm2pgsql"]
    environment:
      PGHOST: postgis
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-fishing_vibe}
      PGUSER: ${POSTGRES_USER:-fishing_vibe}
      PGPASSWORD: ${POSTGRES_PASSWORD:-fishing_vibe}
      OSM_SCHEMA: ${OSM_SCHEMA:-osm_next}
    volumes:
      - ./data/osm:/data:ro
      - ./osm:/config:ro
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgis_data:
