services:
  postgis:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fishing_vibe}
      POSTGRES_USER: ${POSTGRES_USER:-fishing_vibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishing_vibe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgis_data:
