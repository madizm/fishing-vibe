<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>武汉钓鱼钓点地图</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <aside class="panel">
      <header>
        <div class="eyebrow">Douyin + Tianditu</div>
        <h1>武汉钓鱼钓点地图</h1>
        <p id="summary">正在加载钓点数据…</p>
      </header>

      <section class="key-box" id="keyBox">
        <label for="tkInput">天地图 TK</label>
        <div class="row">
          <input id="tkInput" autocomplete="off" placeholder="输入 tk 后加载地图" />
          <button id="loadMapBtn">加载</button>
        </div>
        <small>也可使用 <code>?tk=你的key</code> 打开；TK 仅保存在当前浏览器 localStorage。</small>
      </section>

      <section class="filters">
        <label>搜索钓点 / 作者 / 标题</label>
        <input id="searchInput" placeholder="如：东荆河、黄尾、颜主任" />

        <label>鱼种</label>
        <select id="fishFilter"><option value="">全部鱼种</option></select>

        <label>最低可信度 <span id="confidenceValue">0</span></label>
        <input id="confidenceFilter" type="range" min="0" max="1" step="0.1" value="0" />
      </section>

      <section class="toolbar">
        <button id="fitBtn">定位到全部钓点</button>
        <button id="mapTypeBtn">切换影像/矢量</button>
      </section>

      <ol id="spotList" class="spot-list"></ol>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div id="emptyState" class="empty-state">等待天地图加载…</div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
